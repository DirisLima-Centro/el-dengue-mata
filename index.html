<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const bg = new Image(); bg.src = "fondo.png";
const dikyShoot = new Image(); dikyShoot.src = "D1.png";
const dikyIdle = new Image(); dikyIdle.src = "D2.png";
const mosquitoImg = new Image(); mosquitoImg.src = "mosquito.png";
const mosquitoBlue = new Image(); mosquitoBlue.src = "mosquito2.png";
const mosquitoRed = new Image(); mosquitoRed.src = "mosquito3.png";
const hudPanel = new Image(); hudPanel.src = "j1.png";
const startBtnImg = new Image(); startBtnImg.src = "jugar.png";
const replayBtnImg = new Image(); replayBtnImg.src = "volver_jugar.png";
const comboImg = new Image(); comboImg.src = "pre1.png";
const shieldImg = new Image(); shieldImg.src = "v1.png";
const freezeImg = new Image(); freezeImg.src = "h1.png";
const x2Img = new Image(); x2Img.src = "x2.png";
const spray1Img = new Image(); spray1Img.src = "f1.png";
const spray2Img = new Image(); spray2Img.src = "f2.png";
const boomImg = new Image(); boomImg.src = "f3.png";
const logoDiris = new Image(); logoDiris.src = "logo-minsa-2.png";

].map(src => {
  const img = new Image();

const dikyLose = new Image(); dikyLose.src = "D3.png";
const dikyHero = new Image(); dikyHero.src = "D4.png";

const bgm = document.getElementById("bgm");
const LINK_DENGUE = "https://sites.google.com/dirislimacentro.gob.pe/el-dengue-mata/inicio";
const LINK_MATERIALES = "https://dirislimacentro.gob.pe/el-dengue-mata/";
const LINK_JUEGO = "https://TU-LINK-AQUI.com"; // <-- REEMPLAZA POR TU LINK REAL

function track(eventName, params = {}){
  if(typeof gtag === "function"){
    gtag("event", eventName, params);
  }
}

  try{
    render();

    const texto =
      "🎮 Participé en el juego educativo contra el dengue de DIRIS Lima Centro\n" +
      "🏆 Mi puntaje fue: " + score + "\n" +
      "🦟 ¿Puedes superarme?\n" +
      "👉 Juega aquí: " + LINK_JUEGO;

    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    if(!blob) throw new Error("No se pudo generar la imagen");

    const file = new File([blob], "mi-puntaje-zancudo-kill.png", { type: "image/png" });

    if(navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({

        files: [file]
      });

    if(navigator.share){
      await navigator.share({

    descargarCaptura(blob);
    const wa = "https://wa.me/?text=" + encodeURIComponent(texto);

  }catch(err){

function descargarCaptura(blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "mi-puntaje-zancudo-kill.png";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

let state = "start";
let score = 0, timeLeft = 60, combo = 0, bestCombo = 0, level = 1;
let last = 0, spawnTimer = 0, shootTimer = 0, bossSpawned = false;
let player = {x: W/2, y: H-165, w: 150, h: 165, targetX: W/2, hp: 3};
let bullets = [], enemies = [], particles = [], floats = [], pickups = [];
let boss = null;
let shake = 0, bgPan = 0, comboFlash = 0, shieldFx = 0, freezeTimer = 0, x2Timer = 0;
let keys = {};

let popupActive = false;
let popupImgActual = null;
let popupShown = [false, false, false, false, false];
const popupScoreSteps = [1400, 2800, 4200, 5600, 7000];
let hoveredEndButton = null;
let scoreAnim = 0;

let audioCtx = null;

function getAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function beep(type, f1, f2, dur, vol){
  const ac = getAudio();
  if(!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2, ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur);
}

const sfxShoot = ()=>beep("square",800,280,0.08,0.03);
const sfxHit   = ()=>beep("triangle",260,700,0.12,0.05);
const sfxBad   = ()=>beep("sawtooth",180,90,0.18,0.035);
const sfxBoss  = ()=>beep("sawtooth",110,60,0.4,0.06);
const sfxPower = ()=>beep("triangle",520,920,0.15,0.05);

function startMusic(){
  bgm.volume = 0.55;
  bgm.play().catch(()=>{});
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function rand(a,b){ return a + Math.random() * (b-a); }

function addFloat(text,x,y,color,size=22){
  floats.push({text,x,y,color,size,life:0.8});
}

function burst(x,y,color,n=12){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:rand(-180,180),
      vy:rand(-180,180),
      r:rand(2,7),
      life:rand(0.3,0.9),
      max:rand(0.3,0.9),
      color
    });
  }
}

function addPickup(kind,x,y){
  pickups.push({kind,x,y,vy:110,r:28,wobble:rand(0,Math.PI*2)});
}

function resetGame(){
  track("inicio_juego");
  state = "playing";
  score = 0;
  timeLeft = 60;
  combo = 0;
  bestCombo = 0;
  level = 1;
  spawnTimer = 0;
  shootTimer = 0;
  bossSpawned = false;
  shake = 0;
  comboFlash = 0;
  bullets = [];
  enemies = [];
  particles = [];
  floats = [];
  pickups = [];
  boss = null;
  player.x = W/2;
  player.targetX = W/2;
  player.hp = 3;
  shieldFx = 0;
  freezeTimer = 0;
  x2Timer = 0;

  popupActive = false;
  popupImgActual = null;
  popupShown = [false, false, false, false, false];
  hoveredEndButton = null;
  scoreAnim = 0;
  canvas.style.cursor = "default";

  last = performance.now();
  startMusic();
}

function shoot(){
  if(state !== "playing" || shootTimer > 0 || popupActive) return;
  bullets.push({x:player.x-24,y:player.y+42,vy:-700,r:11,img:Math.random()<0.5?spray1Img:spray2Img});
  bullets.push({x:player.x+28,y:player.y+36,vy:-700,r:11,img:Math.random()<0.5?spray1Img:spray2Img});
  shootTimer = 0.16;
  sfxShoot();
}

function spawnEnemy(){
  const t = Math.random();
  let kind = "zancudo";
  if(t < 0.14) kind = "agua";
  if(t > 0.94) kind = "bonus";
  if(t > 0.80 && t <= 0.94) kind = "freeze";

  enemies.push({
    kind,
    sprite: kind === "zancudo" ? (Math.random()<0.5 ? mosquitoBlue : mosquitoRed) : null,
    x: rand(35, W-35),
    y: -40,
    vx: rand(-70,70),
    vy: rand(120 + level*14, 185 + level*18),
    hp: kind === "zancudo" ? (Math.random()<0.28 ? 2 : 1) : 1,
    r: kind === "zancudo" ? 24 : 22,
    wobble: rand(0,Math.PI*2)
  });
}

function spawnBoss(){
  bossSpawned = true;
  boss = {
    x:W/2,
    y:-110,
    targetY:280,
    hp:60,
    maxHp:60,
    phase:0,
    spawnTimer:0.9,
    r:95,
    sprite:mosquitoImg
  };
  addFloat("¡JEFE FINAL!",W/2,280,"#d64545",34);
  sfxBoss();
}

function applyEnemyDeath(e){
  if(e.kind === "zancudo"){
    let plus = 12 + Math.min(combo*2,20);
    if(x2Timer > 0) plus *= 2;
    score += plus;
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    addFloat("+"+plus,e.x,e.y,"#2f9e44");
    burst(e.x,e.y,"#2f9e44",16);
    sfxHit();
    if(combo >= 5) comboFlash = 0.9;
    if(Math.random() < 0.10) addPickup("shield", e.x, e.y);
    if(Math.random() < 0.08) addPickup("x2", e.x, e.y);
  }else if(e.kind === "bonus"){
    score += 35;
    timeLeft = Math.min(60,timeLeft+4);
    addFloat("+35",e.x,e.y,"#ffb703",26);
    addFloat("+4s",e.x+22,e.y-18,"#ffb703",22);
    burst(e.x,e.y,"#ffb703",18);
    sfxHit();
  }else if(e.kind === "freeze"){
    addPickup("freeze", e.x, e.y);
    addFloat("HIELO",e.x,e.y,"#13a3b8",22);
    burst(e.x,e.y,"#13a3b8",16);
    sfxPower();
  }else{
    score = Math.max(0, score-12);
    combo = 0;
    addFloat("-12",e.x,e.y,"#d64545");
    burst(e.x,e.y,"#d64545",14);
    sfxBad();
  }
  shake = 6;
}

function rankName(){
  if(score >= 6500) return "Brigadista DIRIS Legendario";
  if(score >= 5000) return "Brigadista DIRIS Élite";
  if(score >= 3500) return "Brigadista DIRIS";
  if(score >= 2000) return "Protector de la Comunidad";
  return "Aprendiz Anti Dengue";
}

function update(dt){
  bgPan += dt*26;
  shootTimer = Math.max(0, shootTimer-dt);
  shake = Math.max(0, shake-dt*20);
  comboFlash = Math.max(0, comboFlash-dt);
  shieldFx = Math.max(0, shieldFx-dt);
  freezeTimer = Math.max(0, freezeTimer-dt);
  x2Timer = Math.max(0, x2Timer-dt);

  particles = particles.filter(p => (p.life-=dt) > 0);
  for(const p of particles){
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.vx *= 0.98;
    p.vy *= 0.98;
  }

  floats = floats.filter(f => (f.life-=dt) > 0);
  for(const f of floats){
    f.y -= 40*dt;
  }

  if(state === "end" && player.hp > 0){
    if(scoreAnim < score){
      scoreAnim += Math.ceil((score - scoreAnim) / 8);
      if(scoreAnim > score) scoreAnim = score;
    }
  }

  if(state !== "playing") return;

  for(let i = 0; i < popupScoreSteps.length; i++){
    if(score >= popupScoreSteps[i] && !popupShown[i] && !popupActive){
      popupImgActual = popupImgs[i];
      popupActive = true;
      popupShown[i] = true;
      return;
    }
  }

  if(popupActive) return;

  level = 1 + Math.floor((60-timeLeft)/12);

  if(keys["ArrowLeft"] || keys["a"] || keys["A"]) player.targetX -= 360*dt;
  if(keys["ArrowRight"] || keys["d"] || keys["D"]) player.targetX += 360*dt;
  player.targetX = clamp(player.targetX,70,W-70);
  player.x += (player.targetX - player.x) * Math.min(1, dt*11);

  if(keys[" "] || keys["Spacebar"]) shoot();

  spawnTimer -= dt;
  const rateBase = boss ? 0.65 : Math.max(0.20, 0.54 - level*0.05);
  const rate = freezeTimer > 0 ? rateBase*1.4 : rateBase;

  if(spawnTimer <= 0){
    spawnEnemy();
    if(Math.random() < 0.25 + level*0.08) spawnEnemy();
    spawnTimer = rate;
  }

  if(!bossSpawned && timeLeft <= 18) spawnBoss();

  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.y += b.vy*dt;
    if(b.y < -18){
      bullets.splice(i,1);
      continue;
    }

    let hit = false;

    for(let j=enemies.length-1;j>=0;j--){
      const e = enemies[j];
      if(Math.hypot(b.x-e.x, b.y-e.y) < b.r + e.r){
        bullets.splice(i,1);
        hit = true;
        e.hp--;
        burst(b.x,b.y,"#13a3b8",6);
        if(e.hp <= 0){
          applyEnemyDeath(e);
          enemies.splice(j,1);
        } else {
          sfxHit();
        }
        break;
      }
    }
    if(hit) continue;

    if(boss && Math.hypot(b.x-boss.x,b.y-boss.y) < b.r + boss.r*0.78){
      bullets.splice(i,1);
      boss.hp--;
      addFloat("-1",boss.x+rand(-28,28),boss.y+rand(-20,20),"#734800",18);
      burst(b.x,b.y,"#ffce3a",6);
      sfxHit();
      shake = 4;
      if(boss.hp <= 0){
        let bonus = 220;
        if(x2Timer > 0) bonus *= 2;
        score += bonus;
        addFloat("+"+bonus,boss.x,boss.y,"#ffce3a",32);
        burst(boss.x,boss.y,"#ffce3a",40);
        boss = null;
        sfxBoss();
      }
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.wobble += dt*4;

    if(freezeTimer <= 0 || e.kind !== "zancudo"){
      e.x += e.vx*dt + Math.sin(e.wobble)*38*dt;
      e.y += e.vy*dt;
    }

    if(e.x < 24 || e.x > W-24) e.vx *= -1;

    if(Math.abs(e.x-player.x) < 58 && Math.abs(e.y-(player.y+68)) < 58){
      if(e.kind === "zancudo"){
        if(shieldFx > 0){
          addFloat("ESCUDO",player.x,player.y+18,"#13a3b8",22);
        } else {
          player.hp--;
          combo = 0;
          addFloat("¡OUCH!",player.x,player.y+18,"#d64545",24);
          sfxBad();
        }
      }else if(e.kind === "agua"){
        score = Math.max(0, score-15);
        combo = 0;
        addFloat("-15",player.x,player.y+18,"#d64545",24);
        sfxBad();
      }else if(e.kind === "bonus"){
        score += 20;
        addFloat("+20",player.x,player.y+18,"#ffb703",24);
        sfxHit();
      }else if(e.kind === "freeze"){
        freezeTimer = 4.5;
        addFloat("CONGELADO",player.x,player.y+18,"#13a3b8",24);
        sfxPower();
      }

      burst(e.x,e.y,e.kind==="agua"?"#d64545":"#2f9e44",14);
      enemies.splice(i,1);
      shake = 8;

      if(player.hp <= 0){
        timeLeft = 0;
        state = "end";
      }
      continue;
    }

    if(e.y > H+35){
      if(e.kind === "zancudo") combo = 0;
      enemies.splice(i,1);
    }
  }

  for(let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    p.wobble += dt*4;
    p.y += p.vy*dt;
    p.x += Math.sin(p.wobble)*25*dt;

    if(Math.abs(p.x-player.x) < 54 && Math.abs(p.y-(player.y+60)) < 56){
      if(p.kind === "shield"){
        player.hp = Math.min(5, player.hp+1);
        shieldFx = 3.5;
        addFloat("+VIDA",p.x,p.y,"#13a3b8",24);
      }else if(p.kind === "freeze"){
        freezeTimer = 4.5;
        addFloat("HIELO",p.x,p.y,"#13a3b8",24);
      }else if(p.kind === "x2"){
        x2Timer = 6;
        addFloat("X2",p.x,p.y,"#ffb703",26);
      }
      sfxPower();
      pickups.splice(i,1);
      continue;
    }

    if(p.y > H+30) pickups.splice(i,1);
  }

  if(boss){
    boss.phase += dt;
    if(freezeTimer <= 0){
      if(boss.y < boss.targetY) boss.y += 130*dt;
      boss.x = W/2 + Math.sin(boss.phase*1.5)*120;
      boss.spawnTimer -= dt;
      if(boss.spawnTimer <= 0){
        boss.spawnTimer = 1.0;
        enemies.push({
          kind:"zancudo",
          sprite:Math.random()<0.5?mosquitoBlue:mosquitoRed,
          x:boss.x+rand(-42,42),
          y:boss.y+26,
          vx:rand(-90,90),
          vy:rand(180,230),
          hp:1,
          r:24,
          wobble:rand(0,Math.PI*2)
        });
      }
    }
  }

  timeLeft -= dt;
  if(timeLeft <= 0){
    timeLeft = 0;
    state = "end";
    track("fin_juego", {
      resultado: player.hp > 0 ? "gano" : "perdio",
      puntaje: score,
      nivel: level
    });
  }
}

function rr(x,y,w,h,r,fill=true){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  if(fill) ctx.fill(); else ctx.stroke();
}

function drawBG(){
  if(bg.complete && bg.naturalWidth){
    const scale = H / bg.height;
    const drawW = bg.width * scale;
    const cycle = Math.max(1, drawW - W);
    const sx = (Math.sin(bgPan/90)*0.5 + 0.5) * cycle;
    ctx.drawImage(bg, sx/scale, 0, W/scale, bg.height, 0, 0, W, H);
    ctx.fillStyle = freezeTimer>0 ? "rgba(180,240,255,.18)" : "rgba(255,255,255,.05)";
    ctx.fillRect(0,0,W,H);
  } else {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#eaf8ff");
    g.addColorStop(1,"#b8e0fb");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }
}

function drawHUD(){
  if(hudPanel.complete && hudPanel.naturalWidth){
    ctx.drawImage(hudPanel, 10, 10, 245, 95);
  } else {
    ctx.fillStyle = "rgba(255,255,255,.94)";
    rr(12,12,245,95,18,true);
  }

  ctx.fillStyle = "#fff9d4";
  ctx.font = "bold 24px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(score, 180, 72);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";

  ctx.fillStyle = "rgba(255,255,255,.9)";
  rr(265,14,153,94,18,true);

  const iconY = 22;
  for(let i=0;i<player.hp;i++){
    if(shieldImg.complete && shieldImg.naturalWidth){
      ctx.drawImage(shieldImg, 276 + i*29, iconY, 25, 25);
    } else {
      ctx.font = "20px Arial";
      ctx.fillText("❤", 278 + i*29, 42);
    }
  }

  ctx.fillStyle = "#14324a";
  ctx.font = "bold 15px Arial";
  ctx.fillText("Nivel: " + level, 276, 62);
  ctx.fillText("Combo: x" + combo, 276, 82);

  if(x2Timer > 0){
    ctx.fillStyle = "rgba(255,255,255,.92)";
    rr(300,150,52,34,10,true);
    if(x2Img.complete && x2Img.naturalWidth){
      ctx.drawImage(x2Img, 304, 154, 24, 24);
    }
    ctx.fillStyle = "#734800";
    ctx.font = "bold 12px Arial";
    ctx.fillText("x2", 332, 171);
  }

  if(freezeTimer > 0){
    ctx.fillStyle = "rgba(255,255,255,.92)";
    rr(358,150,60,34,10,true);
    if(freezeImg.complete && freezeImg.naturalWidth){
      ctx.drawImage(freezeImg, 362, 154, 24, 24);
    }
    ctx.fillStyle = "#0f6cbd";
    ctx.font = "bold 11px Arial";
    ctx.fillText("ICE", 389, 171);
  }

  const gTimeBg = ctx.createLinearGradient(0,128,0,146);
  gTimeBg.addColorStop(0,"rgba(255,255,255,.45)");
  gTimeBg.addColorStop(1,"rgba(255,255,255,.20)");
  ctx.fillStyle = gTimeBg;
  rr(16,128,W-32,18,10,true);

  const gTime = ctx.createLinearGradient(16,128,W-16,146);
  gTime.addColorStop(0,"#19d3e6");
  gTime.addColorStop(1,"#0e8fa0");
  ctx.fillStyle = gTime;
  rr(16,128,(W-32)*(timeLeft/60),18,10,true);
  const timeWidth = (W-32)*(timeLeft/60);

  if(timeWidth > 10){
    ctx.save();
    ctx.beginPath();
    rr(16,128,timeWidth,18,10,true);
    ctx.clip();

    const shineX = 16 + ((performance.now()/2.5) % (timeWidth + 100)) - 100;
    const shine = ctx.createLinearGradient(shineX,128,shineX+100,146);
    shine.addColorStop(0,"rgba(255,255,255,0)");
    shine.addColorStop(0.3,"rgba(255,255,255,.25)");
    shine.addColorStop(0.5,"rgba(255,255,255,.9)");
    shine.addColorStop(0.7,"rgba(255,255,255,.25)");
    shine.addColorStop(1,"rgba(255,255,255,0)");

    ctx.fillStyle = shine;
    ctx.fillRect(16,128,timeWidth,18);
    ctx.restore();
  }

  ctx.strokeStyle = "rgba(255,255,255,.6)";
  ctx.lineWidth = 2;
  rr(16,128,W-32,18,10,false);
}

function drawPlayer(){
  const img = state === "playing" ? dikyShoot : dikyIdle;
  let x = player.x - player.w/2;
  if(state === "end") x -= 150;
  let y = player.y;
  if(state === "playing") y -= 5;

  if(img.complete && img.naturalWidth){
    ctx.drawImage(img,x,y,player.w,player.h);
  } else {
    ctx.fillStyle = "#0f6cbd";
    rr(x,y,player.w,player.h,18,true);
  }

  if(shieldFx > 0){
    const cx = player.x;
    const cy = player.y + 82;
    const r = 68 + Math.sin(performance.now()/180)*2;

    const glow = ctx.createRadialGradient(cx,cy,r-20,cx,cy,r+25);
    glow.addColorStop(0,"rgba(0,200,255,0)");
    glow.addColorStop(.5,"rgba(0,200,255,.18)");
    glow.addColorStop(1,"rgba(0,200,255,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx,cy,r+25,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "rgba(0,200,255,.85)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx,cy,r-4,Math.sin(performance.now()/500),Math.sin(performance.now()/500)+1.2);
    ctx.stroke();
  }
}

function drawBullets(){
  for(const b of bullets){
    if(b.img.complete && b.img.naturalWidth){
      ctx.drawImage(b.img, b.x-20, b.y-20, 40, 40);
    } else {
      const g = ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,11);
      g.addColorStop(0,"#fff");
      g.addColorStop(.5,"#8cff92");
      g.addColorStop(1,"rgba(140,255,146,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x,b.y,11,0,Math.PI*2);

}

function drawEnemies(){
  for(const e of enemies){
    ctx.save();
    ctx.translate(e.x,e.y);
    const pulse = 1 + Math.sin(e.wobble*2)*0.04;
    ctx.scale(pulse,pulse);

    if(e.kind === "zancudo"){
      const sprite = e.sprite || mosquitoBlue;
      ctx.drawImage(sprite,-e.r-4,-e.r-4,e.r*2+8,e.r*2+8);
    } else if(e.kind === "agua"){
      ctx.drawImage(boomImg,-e.r-10,-e.r-10,e.r*2+20,e.r*2+20);
    } else if(e.kind === "bonus"){
      ctx.drawImage(x2Img,-e.r-6,-e.r-6,e.r*2+12,e.r*2+12);
    } else if(e.kind === "freeze"){
      ctx.drawImage(freezeImg,-e.r-6,-e.r-6,e.r*2+12,e.r*2+12);
    }
    ctx.restore();
  }
}

function drawPickups(){
  for(const p of pickups){

    if(p.kind === "x2") img = x2Img;

}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = p.life/p.max;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

function drawFloats(){

    ctx.font = "bold "+f.size+"px Arial";
    ctx.textAlign = "center";

function simpleButton(x,y,w,h,text,bgColor="#0f6cbd", iconType="info", hovered=false){
  const t = performance.now();
  const lift = hovered ? -2 : 0;
  const glow = hovered ? 1 : 0;
  const pulse = hovered ? Math.sin(t / 160) * 0.8 : 0;

  y = y + lift + pulse;

  ctx.fillStyle = hovered ? "rgba(0,0,0,.28)" : "rgba(0,0,0,.18)";
  rr(x, y + h - 5, w, 7, 14, true);

  const g = ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0, bgColor);
  g.addColorStop(1, bgColor);
  ctx.fillStyle = g;
  rr(x,y,w,h,14,true);

  if(glow){
    ctx.fillStyle = "rgba(255,255,255,.10)";
    rr(x-2,y-2,w+4,h+4,16,true);
  }

  const shine = ctx.createLinearGradient(x,y,x,y+h);
  shine.addColorStop(0,"rgba(255,255,255,.35)");
  shine.addColorStop(.45,"rgba(255,255,255,.08)");
  shine.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = shine;
  rr(x,y,w,h,14,true);

  ctx.strokeStyle = hovered ? "rgba(255,255,255,.75)" : "rgba(255,255,255,.35)";
  ctx.lineWidth = hovered ? 2 : 1.5;
  rr(x,y,w,h,14,false);

  const ix = x + 24;
  const iy = y + h/2;

  ctx.fillStyle = "rgba(255,255,255,.18)";
  ctx.beginPath();
  ctx.arc(ix, iy, 13, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.fillStyle = "#ffffff";

  if(iconType === "info"){
    ctx.beginPath();
    ctx.arc(ix, iy-5, 1.8, 0, Math.PI*2);
    ctx.fill();
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(ix, iy-1);
    ctx.lineTo(ix, iy+7);
    ctx.stroke();
  }

  if(iconType === "materials"){
    ctx.strokeRect(ix-5, iy-7, 10, 14);
    ctx.beginPath();
    ctx.moveTo(ix-3, iy-3);
    ctx.lineTo(ix+3, iy-3);
    ctx.moveTo(ix-3, iy);
    ctx.lineTo(ix+3, iy);
    ctx.moveTo(ix-3, iy+3);
    ctx.lineTo(ix+2, iy+3);
    ctx.stroke();
  }

  if(iconType === "share"){
    ctx.beginPath();
    ctx.arc(ix-5, iy, 2.2, 0, Math.PI*2);
    ctx.arc(ix+5, iy-5, 2.2, 0, Math.PI*2);
    ctx.arc(ix+5, iy+5, 2.2, 0, Math.PI*2);
    ctx.fill();

    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(ix-3, iy-1);
    ctx.lineTo(ix+3, iy-4);
    ctx.moveTo(ix-3, iy+1);
    ctx.lineTo(ix+3, iy+4);
    ctx.stroke();
  }

  ctx.fillStyle = "#ffffff";
  ctx.font = hovered ? "bold 18px Arial" : "bold 17px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x + w/2 + 12, y + h/2);

  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function wrap(text,cx,y,maxw,lh){
  const words = text.split(" ");
  let line = "", yy = y;
  for(let i=0;i<words.length;i++){
    const test = line + words[i] + " ";
    if(ctx.measureText(test).width > maxw && i>0){
      ctx.fillText(line.trim(),cx,yy);
      line = words[i] + " ";
      yy += lh;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(),cx,yy);
}

  const maxH = 470;

    maxW / popupImgActual.width,
    maxH / popupImgActual.height
  );

  const w = popupImgActual.width * scale;
  const h = popupImgActual.height * scale;

  const x = W/2 - w/2;
  const y = H/2 - h/2 - 20;

  ctx.drawImage(popupImgActual, x, y, w, h);

  const btnW = 210;
  const btnH = 46;
  const btnX = W/2 - btnW/2;
  const btnY = y + h + 16;

  gBtn.addColorStop(0,"#27a2ff");
  gBtn.addColorStop(1,"#0f6cbd");

  ctx.fillStyle = gBtn;
  rr(btnX, btnY, btnW, btnH, 16, true);

  ctx.fillStyle = "rgba(0,0,0,.25)";
  rr(btnX, btnY+btnH-6, btnW, 6, 16, true);

  shine.addColorStop(.4,"rgba(255,255,255,.15)");

  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function render(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  if(shake > 0) ctx.translate(rand(-shake,shake),rand(-shake,shake));
  drawBG();

  if(state === "playing"){
    drawEnemies();
    drawBoss();
    drawPickups();
    drawBullets();
    drawParticles();
    drawPlayer();
    drawFloats();
    drawHUD();
    drawCombo();
  }

  ctx.restore();

  if(state === "start") drawStart();
  if(state === "end") drawEnd();
  drawPopup();
}

function loop(ts){
  const dt = Math.min(0.033,(ts-last)/1000 || 0);
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function pos(e){
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x:(t.clientX-r.left)*(W/r.width),
    y:(t.clientY-r.top)*(H/r.height)
  };
}

function press(x,y){
  getAudio();
  startMusic();

  if(popupActive && popupImgActual){
    const maxW = 280;
    const maxH = 470;

    const scale = Math.min(
      maxW / popupImgActual.width,
      maxH / popupImgActual.height
    );

    const w = popupImgActual.width * scale;
    const h = popupImgActual.height * scale;
    const popupY = H/2 - h/2 - 20;

    const btnW = 210;
    const btnH = 46;
    const btnX = W/2 - btnW/2;
    const btnY = popupY + h + 16;

    if(
      x >= btnX &&
      x <= btnX + btnW &&
      y >= btnY &&
      y <= btnY + btnH
    ){
      popupActive = false;
    }
    return;
  }

  if(state === "start"){
    if(x >= W/2-112 && x <= W/2+112 && y >= 480 && y <= 570) resetGame();
    return;
  }

  if(state === "end"){
    const dengueBtn = player.hp > 0
      ? { x: W/2 - 115, y: 485, w: 230, h: 42 }
      : { x: W/2 - 115, y: 438, w: 230, h: 42 };

    const materialesBtn = player.hp > 0
      ? { x: W/2 - 115, y: 535, w: 230, h: 42 }
      : { x: W/2 - 115, y: 488, w: 230, h: 42 };

    const compartirBtn = player.hp > 0
      ? { x: W/2 - 115, y: 585, w: 230, h: 42 }
      : null;

    const replayBtn = player.hp > 0
      ? { x: W/2 - 120, y: 655, w: 240, h: 95 }
      : { x: W/2 - 120, y: 565, w: 240, h: 95 };

    const pad = 0;

    if(
      x >= materialesBtn.x - pad &&
      x <= materialesBtn.x + materialesBtn.w + pad &&
      y >= materialesBtn.y - pad &&
      y <= materialesBtn.y + materialesBtn.h + pad
    ){
      window.open(LINK_MATERIALES, "_blank");
      return;
    }

    if(
      compartirBtn &&
      x >= compartirBtn.x - pad &&
      x <= compartirBtn.x + compartirBtn.w + pad &&
      y >= compartirBtn.y - pad &&
      y <= compartirBtn.y + compartirBtn.h + pad
    ){
      compartirPuntaje();
      return;
    }

    if(
      x >= dengueBtn.x - pad &&
      x <= dengueBtn.x + dengueBtn.w + pad &&
      y >= dengueBtn.y - pad &&
      y <= dengueBtn.y + dengueBtn.h + pad
    ){
      window.open(LINK_DENGUE, "_blank");
      return;
    }

    if(
      x >= replayBtn.x - pad &&
      x <= replayBtn.x + replayBtn.w + pad &&
      y >= replayBtn.y - pad &&
      y <= replayBtn.y + replayBtn.h + pad
    ){
      resetGame();
      return;
    }

    return;
  }

  player.targetX = x;
  shoot();
}

canvas.addEventListener("mousedown", e=>{
  const p = pos(e);
  press(p.x,p.y);
});

canvas.addEventListener("mousemove", e=>{
  const p = pos(e);

  if(state === "playing" && !popupActive){
    player.targetX = p.x;
    hoveredEndButton = null;
    canvas.style.cursor = "default";
    return;
  }

  if(state === "end"){
    const { dengueBtn, materialesBtn, compartirBtn } = getEndButtons();
    hoveredEndButton = null;

    const inBox = (btn) => btn && p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h;

    if(inBox(dengueBtn)) hoveredEndButton = "dengue";
    else if(inBox(materialesBtn)) hoveredEndButton = "materiales";
    else if(inBox(compartirBtn)) hoveredEndButton = "compartir";

    canvas.style.cursor = hoveredEndButton ? "pointer" : "default";
    return;
  }

  hoveredEndButton = null;
  canvas.style.cursor = "default";
});

canvas.addEventListener("touchstart", e=>{
  const p = pos(e);
  press(p.x,p.y);
  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchmove", e=>{
  if(state === "playing" && !popupActive) player.targetX = pos(e).x;
  e.preventDefault();
}, {passive:false});

window.addEventListener("keydown", e=>{
  keys[e.key] = true;

  if(e.key==="9"){
    state="end";
    player.hp=5;
    score=12345;
    scoreAnim=12345;
  }

  if(e.key==="8"){
    state="end";
    player.hp=0;
  }

  if(e.key==="7"){
    resetGame();
    spawnBoss();
  }

  if((state === "start" || state === "end") && e.key === "Enter"){
    getAudio();
    startMusic();
    resetGame();
  }

  if((e.key === " " || e.code === "Space") && state === "playing" && !popupActive){
    e.preventDefault();
    shoot();
  }
});

window.addEventListener("keyup", e=>{
  keys[e.key] = false;
});

last = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
